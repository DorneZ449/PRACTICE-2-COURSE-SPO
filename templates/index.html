<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Генератор паролей</h1>

        <form method="post" action="/">
            <div class="field">
                <label for="length">Длина пароля:</label>
                <input type="number" id="length" name="length"
                       min="4" max="50" value="{{ length or 12 }}">
            </div>

            <div class="checkboxes">
                <label>
                    <input type="checkbox" name="use_lower" checked>
                    Строчные буквы (a-z)
                </label>
                <label>
                    <input type="checkbox" name="use_upper" checked>
                    Заглавные буквы (A-Z)
                </label>
                <label>
                    <input type="checkbox" name="use_digits" checked>
                    Цифры (0-9)
                </label>
                <label>
                    <input type="checkbox" name="use_special" checked>
                    Спецсимволы (!@#$...)
                </label>
            </div>

            <button type="submit">Сгенерировать</button>
        </form>

        {% if password %}
        <div class="result">
            <p>Ваш пароль:</p>
            <input type="text" value="{{ password }}" readonly>
        </div>
        {% endif %}
    </div>
</body>
</html>
